name: 📍 Migration geopoints

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migration:
    name: Ajout coordonnées GPS
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Dépendances
        run: pip install requests

      - name: 📍 Migration geopoints
        run: python migrate_geopoint.py

      - name: 📊 Commit data/*.json
        run: |
          git config user.name "DPE Prospector Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📍 Migration geopoints [$(date '+%d/%m/%Y')]"
          git push
