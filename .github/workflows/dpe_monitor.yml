name: 🏠 DPE Prospector — Multi-agences

on:
  schedule:
    - cron: "0 3 * * 1-6"   # Lun→Sam à 3h UTC (5h Paris été / 4h Paris hiver)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  surveiller-dpe:
    name: Surveillance DPE toutes agences
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Dépendances
        run: pip install requests

      - name: 💾 Restauration cache DPE
        uses: actions/cache@v4
        with:
          path: dpe_cache.json
          key: dpe-cache-${{ github.run_number }}
          restore-keys: |
            dpe-cache-

      - name: 🔍 Surveillance DPE toutes agences
        env:
          EMAIL_EXPEDITEUR:   ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE: ${{ secrets.EMAIL_MOT_DE_PASSE }}
          ZONES_JSON:         ${{ secrets.ZONES_JSON }}
        run: python dpe_monitor.py

      - name: 📊 Commit data/*.json
        run: |
          git config user.name "DPE Prospector Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Mise à jour DPE [$(date '+%d/%m/%Y')]"
          git push
