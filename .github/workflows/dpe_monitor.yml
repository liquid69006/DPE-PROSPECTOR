name: 🏠 DPE Prospector — Multi-agences

on:
  schedule:
    - cron: "0 3 * * 1-6"   # Lun→Sam à 3h UTC (5h Paris été / 4h Paris hiver)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  surveiller-dpe:
    name: Surveillance DPE toutes agences
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Dépendances
        run: pip install requests

      - name: 🔍 Surveillance DPE toutes agences
        env:
          EMAIL_EXPEDITEUR:   ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE: ${{ secrets.EMAIL_MOT_DE_PASSE }}
          ZONES_JSON:         ${{ secrets.ZONES_JSON }}
        run: python dpe_monitor.py

      - name: 📊 Commit cache + data (persistance Git, pas d'actions/cache)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dpe_cache.json data/*.json
          git commit -m "Update cache and data [skip ci]" || echo "Nothing to commit"
          git push
